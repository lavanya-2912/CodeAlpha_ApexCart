<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexCart - Premium E-Commerce</title>
  <!-- SEO Tags -->
  <meta name="description" content="Shop premium electronics, fashion, home decor, sports gear, and books at ApexCart. Production-grade architecture with fast checkouts.">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom Premium Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Chart.js for Admin Dashboard Analytical Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>

  <!-- Main Navigation (Rendered dynamically) -->
  <div id="navbar-container"></div>

  <!-- Core SPA Viewport -->
  <main id="app" class="fade-in-content"></main>

  <!-- Main Footer (Rendered dynamically) -->
  <div id="footer-container"></div>

  <!-- Bootstrap Bundle with Popper JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Stripe JS (Test Mode Client Library) -->
  <script src="https://js.stripe.com/v3/"></script>
  
  <!-- Application Entry Point JS Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
